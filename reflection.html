<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reflection – Hospitality Advisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #1e3c72;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header p {
            color: #4a627a;
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-content {
            padding: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: #1e3c72;
            font-size: 0.9rem;
        }

        input, select, textarea {
            padding: 0.75rem;
            border: 1px solid #d0dae8;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.25rem;
        }

        .checkbox-group label {
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            transform: scale(0.97);
        }

        .result-area {
            margin-top: 2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }

        .result-card {
            background: #f0f9ff;
            border-left: 5px solid #3b82f6;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .stage-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #1e40af;
        }

        .stage-content {
            line-height: 1.6;
            color: #1e293b;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .meta-info {
            font-size: 0.85rem;
            color: #5b6e8c;
            text-align: right;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            border-left-color: #ef4444;
            color: #b91c1c;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6c7a91;
        }

        @media (max-width: 640px) {
            .card-content {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span>🪞</span> Reflection <span style="font-size: 1.5rem;">|</span> <span>🏨</span>
        </h1>
        <p>Initial answer → Critique → Refined answer</p>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="form-grid">
                <div class="form-group">
                    <label>📍 Destination</label>
                    <input type="text" id="destination" placeholder="e.g., Goa, Udaipur, Kerala" value="Goa">
                </div>
                <div class="form-group">
                    <label>💰 Budget per night (INR)</label>
                    <input type="number" id="budget" placeholder="Optional" step="500">
                </div>
                <div class="form-group">
                    <label>🛏️ Room type (optional)</label>
                    <select id="roomType">
                        <option value="">Any</option>
                        <option value="deluxe">Deluxe</option>
                        <option value="suite">Suite</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>✨ Amenities (optional)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="beachfront"> Beachfront</label>
                    <label><input type="checkbox" value="pool"> Pool</label>
                    <label><input type="checkbox" value="breakfast"> Breakfast included</label>
                    <label><input type="checkbox" value="spa"> Spa</label>
                    <label><input type="checkbox" value="gym"> Gym</label>
                    <label><input type="checkbox" value="wifi"> Free Wi‑Fi</label>
                </div>
            </div>

            <div class="form-group">
                <label>📝 Additional requests (optional)</label>
                <textarea id="special" rows="2" placeholder="e.g., romantic view, near nightlife, family‑friendly"></textarea>
            </div>

            <button id="runBtn">
                <span>🪞</span> Reflect & Improve
            </button>

            <div id="resultContainer" class="result-area">
                <!-- dynamic content -->
            </div>
        </div>
    </div>
    <footer>
        Agentic AI • Reflection (Hospitality) • Backend on Render
    </footer>
</div>

<script>
    // === CONFIGURATION ===
    const API_URL = "https://ai-reflection-tkhw.onrender.com/reflect";

    // === Build natural language query from form fields ===
    function buildQuery() {
        const destination = document.getElementById('destination').value.trim();
        const budget = document.getElementById('budget').value;
        const roomType = document.getElementById('roomType').value;
        const amenities = Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(cb => cb.value);
        const special = document.getElementById('special').value.trim();

        if (!destination) return null;

        let query = `I need a hotel in ${destination}`;
        if (budget) query += ` with budget around ${budget} INR per night`;
        if (roomType) query += `, ${roomType} room`;
        if (amenities.length) query += `, amenities: ${amenities.join(', ')}`;
        if (special) query += `. Additional requests: ${special}`;
        return query;
    }

    // === Main function ===
    async function runReflection() {
        const query = buildQuery();
        if (!query) {
            showError("Please enter at least a destination.");
            return;
        }

        const resultDiv = document.getElementById('resultContainer');
        resultDiv.innerHTML = `
            <div class="result-card" style="text-align: center;">
                <div class="loader" style="margin-bottom: 0.5rem;"></div>
                <strong>Generating reflection...</strong><br>
                <span style="font-size: 0.9rem;">Initial answer → Critique → Refined answer</span>
            </div>
        `;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server error (${response.status}): ${errorText.slice(0, 100)}`);
            }

            const data = await response.json();

            // Format each stage with preserved line breaks
            const initialHtml = escapeHtml(data.initial_answer).replace(/\n/g, '<br>');
            const critiqueHtml = escapeHtml(data.critique).replace(/\n/g, '<br>');
            const refinedHtml = escapeHtml(data.refined_answer).replace(/\n/g, '<br>');

            const html = `
                <div class="result-card">
                    <div class="stage-title">
                        <span>📝</span> Initial Answer
                    </div>
                    <div class="stage-content">${initialHtml}</div>
                </div>
                <div class="result-card">
                    <div class="stage-title">
                        <span>🔍</span> Critique
                    </div>
                    <div class="stage-content">${critiqueHtml}</div>
                </div>
                <div class="result-card">
                    <div class="stage-title">
                        <span>✨</span> Refined Answer
                    </div>
                    <div class="stage-content">${refinedHtml}</div>
                </div>
                <div class="meta-info">
                    ⏱️ Total time: ${data.elapsed_time.toFixed(2)} seconds
                </div>
            `;
            resultDiv.innerHTML = html;
        } catch (error) {
            console.error(error);
            showError(error.message);
        }
    }

    function showError(message) {
        const resultDiv = document.getElementById('resultContainer');
        resultDiv.innerHTML = `
            <div class="result-card error">
                <strong>❌ Error</strong><br>
                ${escapeHtml(message)}
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('runBtn').addEventListener('click', runReflection);
</script>
</body>
</html>
