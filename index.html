<!DOCTYPE html>
<html>
<head>
    <title>AI Real Estate Advisor</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 2rem; }
        textarea { width: 100%; height: 100px; margin: 1rem 0; }
        select, button { padding: 0.5rem; margin: 0.5rem 0; }
        #result { background: #f5f5f5; padding: 1rem; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🏠 AI Real Estate Advisor</h1>
    <p>Ask about 3BHK flats in Bangalore</p>
    <textarea id="query" placeholder="e.g., Find me a 3BHK in Whitefield under 5 Crore"></textarea>
    <select id="mode">
        <option value="parallel">Parallel (Faster)</option>
        <option value="sequential">Sequential (Original)</option>
    </select>
    <button onclick="callAgent()">Get Advice</button>
    <div id="result"></div>

    <script>
        const API_URL = "https://agentic-ai-portfolio.onrender.com/agent";

        async function callAgent() {
            const query = document.getElementById("query").value;
            const mode = document.getElementById("mode").value;
            if (!query) return;
            document.getElementById("result").innerHTML = "Thinking...";
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query, mode })
                });
                const data = await response.json();
                document.getElementById("result").innerHTML = `
                    <strong>Answer:</strong><br>${data.final_answer}<br><br>
                    <em>Mode: ${data.mode_used}</em><br>
                    <em>Time: ${data.elapsed_time.toFixed(2)} seconds</em>
                `;
            } catch (error) {
                document.getElementById("result").innerHTML = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
